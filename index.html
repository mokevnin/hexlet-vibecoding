<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор калорий</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card">
    <h1>Калькулятор калорий</h1>
    <p class="subtitle">Рассчитайте суточную норму калорий по формуле Миффлина-Сан Жеора</p>

    <form id="calc-form" novalidate>
      <div class="field">
        <span class="label">Пол</span>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="male" checked /> Мужчина</label>
          <label><input type="radio" name="gender" value="female" /> Женщина</label>
        </div>
      </div>

      <div class="field">
        <label class="label" for="age">Возраст (лет)</label>
        <input type="number" id="age" name="age" min="1" max="120" step="1" placeholder="30" required />
      </div>

      <div class="field">
        <label class="label" for="weight">Вес (кг)</label>
        <input type="number" id="weight" name="weight" min="1" max="400" step="0.1" placeholder="70" required />
      </div>

      <div class="field">
        <label class="label" for="height">Рост (см)</label>
        <input type="number" id="height" name="height" min="1" max="250" step="0.1" placeholder="175" required />
      </div>

      <div class="field">
        <label class="label" for="activity">Уровень активности</label>
        <select id="activity" name="activity">
          <option value="1.2">Минимальный (сидячий образ жизни)</option>
          <option value="1.375">Низкий (1–3 тренировки в неделю)</option>
          <option value="1.55" selected>Средний (3–5 тренировок в неделю)</option>
          <option value="1.725">Высокий (6–7 тренировок в неделю)</option>
          <option value="1.9">Очень высокий (тяжёлый физический труд)</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="goal">Цель</label>
        <select id="goal" name="goal">
          <option value="0.85">Похудение (−15%)</option>
          <option value="1" selected>Поддержание веса</option>
          <option value="1.15">Набор массы (+15%)</option>
        </select>
      </div>

      <button type="submit" class="btn">Рассчитать</button>
    </form>

    <p id="error" class="error" hidden></p>

    <section id="result" class="result" hidden aria-live="polite">
      <div class="result-main">
        <span class="result-value" id="calories">—</span>
        <span class="result-unit">ккал / день</span>
      </div>
      <p class="result-note" id="bmr-note"></p>
      <div class="macros">
        <div class="macro"><span class="macro-value" id="protein">—</span><span class="macro-label">Белки, г</span></div>
        <div class="macro"><span class="macro-value" id="fat">—</span><span class="macro-label">Жиры, г</span></div>
        <div class="macro"><span class="macro-value" id="carbs">—</span><span class="macro-label">Углеводы, г</span></div>
      </div>
    </section>
  </main>

  <script src="calculator.js"></script>
  <script src="app.js"></script>
</body>
</html>
